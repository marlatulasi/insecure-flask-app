{% extends 'base.html' %}
{% block content %}
<h2>Profile</h2>
<p>Username: {{ user.username }}</p>
{% if user.image %}
  <p><img src="{{ url_for('static', filename='uploads/' + user.image) }}" width="100"></p>
{% endif %}
<p><a href="{{ url_for('change_password') }}">Change Password</a></p>
<p><a href="{{ url_for('upload') }}">Upload Image</a></p>
{% endblock %}
